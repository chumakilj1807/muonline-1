name: Build MuAndroid APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android API 36
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Skip mgcb (use pre-built XNBs from repo)
        run: echo '<Project><Target Name="RunContentBuilder" DependsOnTargets="PrepareContentBuilder"><Message Text="RunContentBuilder skipped - using pre-built XNBs" Importance="High" /></Target></Project>' > Directory.Build.targets

      - name: Build APK
        run: |
          dotnet publish ./MuAndroid/MuAndroid.csproj \
            -f net10.0-android \
            -c Release \
            -p:AndroidPackageFormat=apk \
            -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
            -p:JavaSdkDirectory=$JAVA_HOME

      - name: Find APK
        run: find . -name "*.apk" | head -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MuAndroid-Release-APK
          path: MuAndroid/bin/**/*.apk
          retention-days: 30
