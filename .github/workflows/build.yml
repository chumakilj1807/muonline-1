name: Build and Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-android:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: |
            platform-tools
            platforms;android-36
            build-tools;35.0.0
            ndk;27.2.12479018
          accept-android-sdk-licenses: true

      - name: Install dotnet android workload
        run: dotnet workload install android

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore MuAndroid/MuAndroid.csproj -p:AndroidSdkDirectory=$env:ANDROID_SDK_ROOT

      - name: Clean project
        run: dotnet clean MuAndroid/MuAndroid.csproj -c Release -p:AndroidSdkDirectory=$env:ANDROID_SDK_ROOT

      - name: Decode keystore
        run: |
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\release.keystore",
            [System.Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}"))

      - name: Publish Android APK (signed)
        run: |
          dotnet publish MuAndroid/MuAndroid.csproj -c Release -f net10.0-android -o publish-android `
            -p:AndroidSdkDirectory=$env:ANDROID_SDK_ROOT `
            -p:JavaSdkDirectory=$env:JAVA_HOME `
            -p:AcceptAndroidSdkLicenses=true `
            -p:AndroidPackageFormat=apk `
            -p:RunAOTCompilation=false `
            -p:UseInterpreter=true `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore="$env:RUNNER_TEMP\release.keystore" `
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" `
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}" `
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_STORE_PASSWORD }}"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: muonline-android
          path: publish-android/*-Signed.apk
          retention-days: 30
